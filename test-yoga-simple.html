<!DOCTYPE html>
<html>
<head>
    <title>瑜伽打卡简化测试</title>
    <style>
        body { padding: 20px; font-family: Arial; }
        button { padding: 10px 20px; margin: 10px; }
        #output { margin-top: 20px; padding: 10px; background: #f5f5f5; }
    </style>
</head>
<body>
    <h1>瑜伽打卡简化测试</h1>
    <button id="testBtn">测试打卡</button>
    <button id="clearBtn">清除数据</button>
    <div id="output"></div>
    
    <script>
        // 直接从原文件复制的核心逻辑
        let yogaData = JSON.parse(localStorage.getItem('yogaData')) || {
            streak: 0,
            total: 0,
            points: 0,
            history: [],
            pointsHistory: [],
            lastCheckDate: null,
            missedDays: 0
        };
        
        const output = document.getElementById('output');
        
        function log(msg) {
            output.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
        }
        
        function checkIn() {
            log('开始打卡流程...');
            
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            
            // 如果今天已经打卡，直接返回
            if (yogaData.history.includes(todayStr)) {
                log('今天已经打卡过了！');
                alert('今天已经打卡过了！');
                return;
            }
            
            // 检查是否是连续打卡
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            
            let todayPoints = 1; // 基础分1分
            
            if (yogaData.history.includes(yesterdayStr) || yogaData.history.length === 0) {
                yogaData.streak += 1;
                
                // 连续打卡3天奖励3分
                if (yogaData.streak % 3 === 0) {
                    todayPoints += 3;
                    yogaData.pointsHistory.push({
                        date: todayStr,
                        points: 3,
                        reason: "连续打卡3天奖励"
                    });
                    log('连续打卡3天奖励+3分！');
                }
            } else {
                yogaData.streak = 1;
                log('打卡中断，重新开始连续计数');
            }
            
            // 记录基础分
            yogaData.pointsHistory.push({
                date: todayStr,
                points: 1,
                reason: "每日打卡"
            });
            
            // 更新数据
            yogaData.total += 1;
            yogaData.history.push(todayStr);
            yogaData.points += todayPoints;
            yogaData.lastCheckDate = todayStr;
            
            // 保存到localStorage
            localStorage.setItem('yogaData', JSON.stringify(yogaData));
            
            log(`打卡成功！获得${todayPoints}分，当前积分：${yogaData.points}，连续天数：${yogaData.streak}`);
            alert(`打卡成功！获得${todayPoints}分`);
        }
        
        function clearData() {
            localStorage.removeItem('yogaData');
            yogaData = {
                streak: 0,
                total: 0,
                points: 0,
                history: [],
                pointsHistory: [],
                lastCheckDate: null,
                missedDays: 0
            };
            log('数据已清除');
        }
        
        // 绑定事件
        document.getElementById('testBtn').addEventListener('click', checkIn);
        document.getElementById('clearBtn').addEventListener('click', clearData);
        
        // 显示当前数据
        log('当前数据：' + JSON.stringify(yogaData));
        log('今天日期：' + new Date().toISOString().split('T')[0]);
    </script>
</body>
</html>
